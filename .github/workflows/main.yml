name: CI
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # -- quality (Go 1.24.x minimum): formatting, tidy, verify, vet, build ----------
  quality:
    name: Quality (1.24.x)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache-dependency-path: go.sum
      - name: Formatting check
        run: |
          fmt_files=$(gofmt -l .)
          if [ -n "$fmt_files" ]; then
            printf 'Unformatted files:\n%s\n' "$fmt_files"
            exit 1
          fi
      - name: Module tidy check
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: Module verify
        run: go mod verify
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...

  # -- staticcheck (stable): pinned staticcheck 2026.1 ---------------------------
  staticcheck:
    name: Staticcheck (stable)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2026.1
      - name: Staticcheck version
        run: staticcheck -version
      - name: Run staticcheck
        run: staticcheck ./...

  # -- test (matrix: 1.24.x minimum + stable current) ---------------------------
  test:
    name: Test (${{ matrix.go }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        go: ['1.24.x', 'stable']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: go.sum
      - name: Test
        run: go test -count=1 -timeout 180s ./...

  # -- race (stable only) -------------------------------------------------------
  race:
    name: Race (stable)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - name: Race detector
        run: go test -race -count=1 -timeout 300s ./...

  # -- compatibility (stable): nested module checks + roundtrip + benchmark ------
  compatibility:
    name: Compatibility (stable)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: |
            go.sum
            testdata/compatibility/v5.3.0/generator/go.sum
            testdata/compatibility/roundtrip/go.sum
            testdata/compatibility/benchmark/go.sum
      - name: Nested module tidy
        run: |
          go -C testdata/compatibility/v5.3.0/generator mod tidy
          go -C testdata/compatibility/roundtrip mod tidy
          go -C testdata/compatibility/benchmark mod tidy
      - name: Nested module verify
        run: |
          go -C testdata/compatibility/v5.3.0/generator mod verify
          go -C testdata/compatibility/roundtrip mod verify
          go -C testdata/compatibility/benchmark mod verify
      - name: Nested module diff check
        run: |
          git diff --exit-code -- \
            testdata/compatibility/v5.3.0/generator/go.mod \
            testdata/compatibility/v5.3.0/generator/go.sum \
            testdata/compatibility/roundtrip/go.mod \
            testdata/compatibility/roundtrip/go.sum \
            testdata/compatibility/benchmark/go.mod \
            testdata/compatibility/benchmark/go.sum
      - name: Roundtrip normal
        run: go -C testdata/compatibility/roundtrip test -count=1 -timeout 180s ./...
      - name: Roundtrip race
        run: go -C testdata/compatibility/roundtrip test -race -count=1 -timeout 300s ./...
      - name: Benchmark normal
        run: go -C testdata/compatibility/benchmark test -count=1 ./...
      - name: Benchmark race
        run: go -C testdata/compatibility/benchmark test -race -count=1 ./...

  # -- coverage (stable): profile + text summary + threshold + artifact upload ----
  coverage:
    name: Coverage (stable)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: go.sum
      - name: Coverage profile
        run: |
          go test -count=1 -timeout 180s -covermode=atomic -coverprofile=coverage.out ./...
      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out | tee coverage.txt
      - name: Coverage threshold
        run: |
          awk '
            BEGIN { found = 0 }
            /^total:/ {
              found++
              value = $NF
              sub(/%$/, "", value)
              if (value !~ /^[0-9]+([.][0-9]+)?$/) {
                print "ERROR: malformed coverage total: " $NF > "/dev/stderr"
                exit 1
              }
              if ((value + 0) < 80.0) {
                printf "FAIL: coverage %s%% is below minimum 80.0%%\n", value > "/dev/stderr"
                exit 1
              }
              printf "Coverage threshold satisfied: %s%% >= 80.0%%\n", value
            }
            END {
              if (found != 1) {
                print "ERROR: expected exactly one total line in coverage.txt" > "/dev/stderr"
                exit 1
              }
            }
          ' coverage.txt
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-stable
          path: |
            coverage.out
            coverage.txt
          retention-days: 14
